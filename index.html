<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Ops Terminal X</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  background: black;
  color: #00ffcc;
  font-family: monospace;
  text-align: center;
  overflow: hidden;
}

/* MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* TITLE */
h1 {
  margin-top: 10px;
  text-shadow: 0 0 20px #00ffcc;
  animation: glitch 1s infinite;
}

@keyframes glitch {
  0% { opacity: 1; }
  50% { opacity: 0.6; }
  100% { opacity: 1; }
}

/* RADAR */
#radar {
  width: 140px;
  height: 140px;
  border: 2px solid #00ffcc;
  border-radius: 50%;
  margin: 10px auto;
  position: relative;
}

#radar::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 2px;
  background: #00ffcc;
  top: 50%;
  transform-origin: left;
  animation: spin 2s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0); }
  to { transform: rotate(360deg); }
}

/* BUTTON */
button {
  padding: 10px 20px;
  border: 2px solid #00ffcc;
  background: transparent;
  color: #00ffcc;
  cursor: pointer;
  margin-top: 10px;
}

/* PROGRESS */
#progressBar {
  width: 80%;
  height: 10px;
  border: 1px solid #00ffcc;
  margin: 10px auto;
}

#progress {
  height: 100%;
  width: 0%;
  background: #00ffcc;
}

/* LOG */
#log {
  height: 120px;
  overflow-y: auto;
  margin-top: 10px;
  font-size: 12px;
  white-space: pre-line;
}

/* MAP */
#map {
  height: 45vh;
  border-top: 2px solid #00ffcc;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<h1>⚠ CYBER OPS TERMINAL ⚠</h1>

<div id="radar"></div>

<div id="progressBar"><div id="progress"></div></div>

<button onclick="startScan()">INITIATE SCAN</button>

<div id="log"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// MATRIX
let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let letters = "01ABCXYZ";
letters = letters.split("");

let fontSize = 12;
let columns = canvas.width / fontSize;
let drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ffcc";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}
setInterval(drawMatrix, 33);

// TYPE TEXT
function typeText(text, speed) {
  return new Promise(resolve => {
    let i = 0;
    let log = document.getElementById("log");

    let interval = setInterval(() => {
      log.innerHTML += text.charAt(i);
      i++;
      if (i >= text.length) {
        clearInterval(interval);
        log.innerHTML += "\n";
        resolve();
      }
    }, speed);
  });
}

// PROGRESS
function progressBar() {
  return new Promise(resolve => {
    let bar = document.getElementById("progress");
    let width = 0;
    let interval = setInterval(() => {
      width++;
      bar.style.width = width + "%";
      if (width >= 100) {
        clearInterval(interval);
        resolve();
      }
    }, 20);
  });
}

// SCAN
let map;

async function startScan() {
  let log = document.getElementById("log");
  log.innerHTML = "";
  document.getElementById("progress").style.width = "0%";

  await typeText("Booting system...", 15);
  await progressBar();

  await typeText("Bypassing security...", 15);
  await progressBar();

  await typeText("Accessing GPS...", 15);
  await progressBar();

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(async function(pos) {

      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;

      await typeText("TARGET LOCKED ✔", 10);
      await typeText("LAT: " + lat, 10);
      await typeText("LNG: " + lon, 10);

      showMap(lat, lon);

    });
  }
}

// MAP
function showMap(lat, lon) {
  if (!map) {
    map = L.map('map').setView([lat, lon], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  }

  L.marker([lat, lon]).addTo(map)
    .bindPopup("📍 TARGET")
    .openPopup();
}
</script>

</body>
</html>
